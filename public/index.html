<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Chatbot</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <h1>Customer Support</h1>
      <p>Ask me anything about our products and services</p>
    </header>
    <div class="chat-messages" id="chat-messages">
      <div class="message bot-message">
        Hello! I'm your customer support assistant. How can I help you today?
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="message-input" placeholder="Type your question..." autocomplete="off">
      <button id="send-button">Send</button>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
